version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/staticfiles
    expose:
      - 8000
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DATABASE_URL=postgres://ganadera_user:password@db:5432/ganadera_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
      - SECRET_KEY=a-secure-secret-key
      - ALLOWED_HOSTS=*

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

  db:
    image: postgis/postgis:13-3.1
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ganadera_db
      - POSTGRES_USER=ganadera_user
      - POSTGRES_PASSWORD=password

  redis:
    image: redis:6.2-alpine

volumes:
  postgres_data:
  static_volume:
